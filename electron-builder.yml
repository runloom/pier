appId: io.pier.app
productName: Pier
copyright: Copyright © 2026 Pier

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - '!**/*.map'

asar: true

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  notarize: false

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

dmg:
  contents:
    - x: 110
      y: 150
    - x: 240
      y: 150
      type: link
      path: /Applications

publish:
  - provider: github
    owner: TBD
    repo: pier
