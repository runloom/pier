appId: io.pier.app
productName: Pier
copyright: Copyright © 2026 Pier

directories:
  output: dist-builder
  buildResources: build

# Native terminal runtime:
# - terminal.ts 用 require("../../native/build/Release/ghostty_native.node")
# - terminal-native-addon.ts 把 GHOSTTY_RESOURCES_DIR 指向
#   native/GhosttyResources/ghostty
# 必须把 .node/.dylib 和 Ghostty resources 都打进包，且 asarUnpack 保留物理路径。
files:
  - out/**/*
  - '!**/*.map'
  - native/build/Release/**
  - native/GhosttyResources/**

extraResources:
  - from: bin/pier.mjs
    to: bin/pier
  - from: resources/fonts
    to: fonts
  - from: packages/plugin-codex/dist-pkg
    to: plugin-packages/pier.codex
    filter:
      - '*.tgz'
      - '*.tgz.sha256'
      - 'plugin.json'
  - from: packages/plugin-grok/dist-pkg
    to: plugin-packages/pier.grok
    filter:
      - '*.tgz'
      - '*.tgz.sha256'
      - 'plugin.json'
  - from: packages/plugin-ssh/dist-pkg
    to: plugin-packages/pier.ssh
    filter:
      - '*.tgz'
      - '*.tgz.sha256'
      - 'plugin.json'

asar: true
asarUnpack:
  - native/build/Release/**
  - native/GhosttyResources/**

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  forceCodeSigning: true
  gatekeeperAssess: false
  notarize: true

publish:
  provider: github
  owner: runloom
  repo: pier
  releaseType: release

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
