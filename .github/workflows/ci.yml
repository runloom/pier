name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:static

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  check:
    if: always()
    needs: [static, coverage, build]
    runs-on: ubuntu-latest
    steps:
      - name: Require successful quality jobs
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          STATIC_RESULT: ${{ needs.static.result }}
        run: |
          test "$STATIC_RESULT" = "success"
          test "$COVERAGE_RESULT" = "success"
          test "$BUILD_RESULT" = "success"

  e2e-macos:
    # Dedicated ephemeral GUI runner: Accessibility permission is pre-granted;
    # the label must not be attached to a persistent developer workstation.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS, pier-e2e]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:libghostty
      - run: pnpm build:native
      - run: pnpm build
      - run: pnpm test:e2e
