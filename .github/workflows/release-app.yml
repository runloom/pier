name: Release App

# Publishes the macOS Pier host app to GitHub Releases Latest for electron-updater.
# Plugin releases must stay prerelease (--latest=false) so they never own /releases/latest.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag including v prefix (e.g. v0.2.0). Must match package.json version.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi
          case "$RAW_TAG" in
            v*) VERSION="${RAW_TAG#v}" ;;
            *)
              echo "tag must look like vX.Y.Z, got: $RAW_TAG" >&2
              exit 1
              ;;
          esac
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved app release tag=$RAW_TAG version=$VERSION"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.version.outputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package.json version matches tag
        run: node ./scripts/verify-app-release-version.mjs "${{ steps.version.outputs.version }}"

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
          # build-dist.sh blocks CSC_LINK publish unless explicitly allowed.
          PIER_DIST_ALLOW_CSC_LINK_PUBLISH: "1"
        run: pnpm build:dist --publish=always

      - name: Verify Latest update metadata exists locally
        run: |
          set -euo pipefail
          ls -lh dist-builder/latest-mac.yml dist-builder/*.zip
          test -f dist-builder/latest-mac.yml

      - name: Verify GitHub Latest release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # electron-updater reads /releases/latest for public repos.
          ASSETS="$(gh release view --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "$ASSETS"
          echo "$ASSETS" | grep -qx 'latest-mac.yml'
          # Accept either arch naming used by electron-builder.
          echo "$ASSETS" | grep -E -q "Pier-${VERSION}.*mac\.zip|${VERSION}.*-mac\.zip"
