name: Release Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'packages/plugin-*/package.json'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin id tail (e.g. codex for pier.codex)'
        required: true
      version:
        description: 'Version to release'
        required: true

# A plugin package version change merged to `main` automatically builds
# `packages/plugin-<tail>`, publishes the tgz under
# `plugin-<tail>-v<version>`, then regenerates `plugins/index.v1.json`.
# `workflow_dispatch` remains available for recovery. Each automatic run must
# contain exactly one plugin package version change so releases stay atomic.

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We need write access to commit the regenerated index back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve plugin release
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAIL="${{ github.event.inputs.plugin }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'packages/plugin-*/package.json')
            COUNT=$(printf '%s\n' "$CHANGED" | awk 'NF { count++ } END { print count + 0 }')
            if [ "$COUNT" -ne 1 ]; then
              echo "expected exactly one changed plugin package.json, found $COUNT" >&2
              printf '%s\n' "$CHANGED" >&2
              exit 1
            fi
            PACKAGE_JSON="$CHANGED"
            REST="${PACKAGE_JSON#packages/plugin-}"
            TAIL="${REST%/package.json}"
            VERSION=$(node -p "require('./${PACKAGE_JSON}').version")
          fi
          PACKAGE_JSON="packages/plugin-${TAIL}/package.json"
          ACTUAL_VERSION=$(node -p "require('./${PACKAGE_JSON}').version")
          if [ "$ACTUAL_VERSION" != "$VERSION" ]; then
            echo "requested ${TAIL}@${VERSION}, but ${PACKAGE_JSON} declares ${ACTUAL_VERSION}" >&2
            exit 1
          fi
          TAG="plugin-${TAIL}-v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tail=$TAIL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=@pier/plugin-$TAIL" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build + pack plugin
        run: pnpm --filter "${{ steps.parse.outputs.package }}" run build:package

      - name: Locate tgz
        id: locate
        run: |
          DIST="packages/plugin-${{ steps.parse.outputs.tail }}/dist-pkg"
          TGZ=$(ls "$DIST"/*.tgz | head -1)
          SHA=$(cat "$TGZ.sha256" | awk '{print $1}')
          SIZE=$(stat -f%z "$TGZ")
          echo "tgz=$TGZ" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify existing release asset is immutable
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.parse.outputs.tag }}
          TGZ: ${{ steps.locate.outputs.tgz }}
          SHA256: ${{ steps.locate.outputs.sha256 }}
        run: |
          mkdir -p "$RUNNER_TEMP/existing-plugin-release"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$(basename "$TGZ")" \
            --dir "$RUNNER_TEMP/existing-plugin-release"
          EXISTING_SHA=$(shasum -a 256 "$RUNNER_TEMP/existing-plugin-release/$(basename "$TGZ")" | awk '{print $1}')
          if [ "$EXISTING_SHA" != "$SHA256" ]; then
            echo "same-version hash drift for $TAG: release=$EXISTING_SHA local=$SHA256" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        if: steps.existing.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse.outputs.tag }}
          name: ${{ steps.parse.outputs.tag }}
          body: |
            Automated plugin release.

            - sha256: `${{ steps.locate.outputs.sha256 }}`
            - size: `${{ steps.locate.outputs.size }}`
          files: |
            ${{ steps.locate.outputs.tgz }}
            ${{ steps.locate.outputs.tgz }}.sha256

      - name: Regenerate plugin index
        env:
          PIER_PLUGIN_INDEX_REQUIRE_SIGNATURE: "1"
          PIER_PLUGIN_INDEX_SIGNING_KEY_ID: ${{ secrets.PIER_PLUGIN_INDEX_SIGNING_KEY_ID }}
          PIER_PLUGIN_INDEX_SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.PIER_PLUGIN_INDEX_SIGNING_PRIVATE_KEY_BASE64 }}
        run: pnpm plugins:index

      - name: Commit index update
        run: |
          if git diff --quiet plugins/index.v1.json; then
            echo "index unchanged; skipping commit"
            exit 0
          fi
          git config user.name "pier-plugins-bot"
          git config user.email "bot@runloom.dev"
          git checkout main
          git pull --rebase origin main
          git add plugins/index.v1.json
          git commit -m "chore(plugins): update index for ${{ steps.parse.outputs.tag }}"
          git push origin main
