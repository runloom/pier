<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Pier app icon — 栈桥与倒影">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1a24"/>
      <stop offset="1" stop-color="#0b0a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.26" r="0.62">
      <stop offset="0" stop-color="#8a76f0" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8a76f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c6b8ff"/>
      <stop offset="1" stop-color="#6a51e0"/>
    </linearGradient>
    <linearGradient id="refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a76f0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8a76f0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- deck -->
  <rect x="116" y="190" width="280" height="28" rx="14" fill="url(#vio)"/>
  <!-- pilings -->
  <rect x="161" y="214" width="26" height="102" rx="13" fill="url(#vio)"/>
  <rect x="243" y="214" width="26" height="102" rx="13" fill="url(#vio)"/>
  <rect x="325" y="214" width="26" height="102" rx="13" fill="url(#vio)"/>
  <!-- beacon — the docked agent -->
  <circle cx="256" cy="176" r="30" fill="#8a76f0" fill-opacity="0.28"/>
  <circle cx="256" cy="176" r="15" fill="#e0d8ff"/>
  <!-- waterline -->
  <rect x="92" y="318" width="328" height="3" rx="1.5" fill="#8a76f0" fill-opacity="0.6"/>
  <!-- reflection -->
  <rect x="161" y="324" width="26" height="78" rx="13" fill="url(#refl)"/>
  <rect x="243" y="324" width="26" height="78" rx="13" fill="url(#refl)"/>
  <rect x="325" y="324" width="26" height="78" rx="13" fill="url(#refl)"/>
  <!-- ripple bands -->
  <rect x="92" y="340" width="328" height="7" fill="#0d0c12" opacity="0.6"/>
  <rect x="92" y="362" width="328" height="7" fill="#0d0c12" opacity="0.78"/>
  <rect x="92" y="384" width="328" height="7" fill="#0d0c12" opacity="0.92"/>
</svg>
